name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Notify QA Wolf so they can start a test run for this deployment.
  # Requires: QA Wolf trigger configured for branch "main" + this deployment-type, and secret QAWOLF_API_KEY.
  notify-qa-wolf:
    name: Notify QA Wolf
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      # Give GitHub Pages time to serve the new version before tests start
      - name: Wait for deployment to be live
        run: sleep 45

      - name: Notify QA Wolf of deployment
        id: notify
        uses: qawolf/notify-qawolf-on-deploy-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          qawolf-api-key: ${{ secrets.QAWOLF_API_KEY }}
          deployment-url: ${{ needs.deploy.outputs.page_url }}
          deployment-type: develop


name: Deploy and Notify QA Wolf

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.set-url.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Set deployment URL (PR)
        id: set-url
        if: github.event_name == 'pull_request'
        run: |
          echo "deployment-url=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_OUTPUT

      - name: Setup Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  wait-for-deployment:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment to be ready
        run: sleep 45

  notify-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy
    name: Notify QA Wolf (main)
    runs-on: ubuntu-latest
    steps:
      - name: Notify QA Wolf of deployment
        uses: qawolf/notify-qawolf-on-deploy-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          qawolf-api-key: ${{ secrets.QAWOLF_API_KEY }}
          deployment-url: ${{ needs.deploy.outputs.page_url }}
          deployment-type: develop

  notify-pr:
    if: github.event_name == 'pull_request'
    needs: [build, wait-for-deployment]
    name: Notify QA Wolf (PR)
    runs-on: ubuntu-latest
    steps:
      - name: Notify QA Wolf of deployment
        uses: qawolf/notify-qawolf-on-deploy-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          qawolf-api-key: ${{ secrets.QAWOLF_API_KEY }}
          deployment-url: ${{ needs.build.outputs.deployment-url }}
          deployment-type: PR
          pull-request-number: ${{ github.event.pull_request.number }}

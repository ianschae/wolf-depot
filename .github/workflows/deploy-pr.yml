name: Deploy and Notify QA Wolf

on:
  pull_request:

jobs:
  deploy-environment:
    name: Build and set deployment URL
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.set-url.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # PR preview URL: replace with your PR preview base if using Vercel/Netlify etc.
      - name: Set deployment URL
        id: set-url
        run: |
          echo "deployment-url=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_OUTPUT

  wait-for-deployment:
    name: Wait for deployment to be ready
    runs-on: ubuntu-latest
    needs: deploy-environment
    steps:
      - name: Wait
        run: sleep 45

  notify:
    needs: deploy-environment
    name: Notify QA Wolf
    runs-on: ubuntu-latest
    steps:
      - name: Notify QA Wolf of deployment
        uses: qawolf/notify-qawolf-on-deploy-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          qawolf-api-key: ${{ secrets.QAWOLF_API_KEY }}
          deployment-url: ${{ needs.deploy-environment.outputs.deployment-url }}
          deployment-type: PR
          pull-request-number: ${{ github.event.pull_request.number }}
